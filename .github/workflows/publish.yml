name: Publish to npm

# Publishes @deneuv34/sensei to the public npm registry.
# Trigger by publishing a GitHub Release (tag vX.Y.Z), or run manually
# via the Actions tab (workflow_dispatch) to publish the current
# package.json version.
#
# Uses npm trusted publishing (OIDC), so no long-lived NPM_TOKEN is
# required. Configure the package on npmjs.com:
#   Package Settings -> Trusted publishing -> GitHub Actions
#   owner: deneuv34, repo: sensei, workflow filename: publish.yml

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Verify release tag matches package.json version
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "release tag=$TAG  package.json=$PKG"
          test "$TAG" = "$PKG"

      - run: npm publish --access public
